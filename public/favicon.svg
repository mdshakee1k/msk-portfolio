<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <style>
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f172a; }
        .primary { fill: #06b6d4; }
        .accent { fill: #ec4899; }
        .text { fill: #f1f5f9; }
      }
      @media (prefers-color-scheme: light) {
        .bg { fill: #f8fafc; }
        .primary { fill: #0891b2; }
        .accent { fill: #be185d; }
        .text { fill: #0f172a; }
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" class="bg"/>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="primary" stop-opacity="0.15"/>
      <stop offset="100%" class="accent" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <rect width="180" height="180" fill="url(#grad1)"/>
  
  <!-- Data visualization bars (analytics/BI theme) -->
  <rect x="45" y="105" width="18" height="45" class="primary" rx="3"/>
  <rect x="81" y="75" width="18" height="75" class="primary" rx="3"/>
  <rect x="117" y="90" width="18" height="60" class="accent" rx="3"/>
  
  <!-- Monogram "M" with tech aesthetic -->
  <g class="text">
    <!-- Left diagonal -->
    <path d="M 55 45 L 55 65" stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Right diagonal -->
    <path d="M 75 45 L 75 65" stroke="currentColor" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Top peak -->
    <circle cx="65" cy="45" r="5" fill="currentColor"/>
  </g>
  
  <!-- Connecting line accent -->
  <line x1="45" y1="70" x2="135" y2="70" stroke="currentColor" stroke-width="2" opacity="0.2"/>
</svg>
